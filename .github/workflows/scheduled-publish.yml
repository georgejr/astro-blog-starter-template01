# Scheduled publishing trigger.
#
# The site deploys through Cloudflare Workers Builds (Git integration): every
# push to main triggers `npm run build` + `npm run deploy` on Cloudflare.
# Scheduled articles are revealed by BUILD TIME, so a build must happen after
# each publication slot (08:00 / 16:00 UTC). This workflow touches a marker
# file shortly after each slot and pushes, which triggers the Cloudflare
# build. It runs ONLY on schedule/manual dispatch — its own push cannot
# retrigger it, so no workflow loop is possible.
name: scheduled-publish

on:
  schedule:
    - cron: "5 8 * * *"
    - cron: "5 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update scheduled-build marker
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > .scheduled-build

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .scheduled-build
          if git diff --cached --quiet; then
            echo "No change, skipping commit."
          else
            git commit -m "chore: scheduled publish trigger $(cat .scheduled-build)"
            git push
          fi
